<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiplomaSpark — Вход в панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);">
<div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white">DiplomaSpark</h1>
        <p class="text-indigo-300 mt-1">Административная панель</p>
    </div>
    <div class="bg-white/10 backdrop-blur border border-white/10 rounded-2xl p-8 shadow-2xl">
        <h2 class="text-xl font-bold text-white mb-6">Вход</h2>
        {% if error %}
        <div class="bg-red-500/20 border border-red-500/40 text-red-300 rounded-lg px-4 py-3 mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/admin/login" class="space-y-4">
            <div>
                <label class="block text-white/70 text-sm mb-1">Пароль</label>
                <input type="password" name="password" required autofocus
                    class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/30 focus:outline-none focus:border-indigo-400 transition"
                    placeholder="Введите пароль администратора">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition">
                Войти
            </button>
        </form>
    </div>
    <p class="text-center text-white/30 text-xs mt-4">Пароль по умолчанию выводится в консоль при первом запуске</p>
</div>
</body>
</html>
